    <title>GWM Retails Management System</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f5f5f5;
            color:#444;
            flex-direction:column;
        }

        .loader{
            width:50px;
            height:50px;
            border:5px solid #ddd;
            border-top:5px solid #ff6a00;
            border-radius:50%;
            animation:spin 1s linear infinite;
            margin-bottom:20px;
        }

        @keyframes spin{
            to{ transform:rotate(360deg); }
        }
    </style>
